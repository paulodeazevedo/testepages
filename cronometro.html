<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronômetro Minimalista</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
            --danger-color: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* Evita selecionar texto ao tocar rápido */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer; /* Indica que a tela é clicável */
            overflow: hidden;
        }

        #reset-btn {
            position: absolute;
            top: 20px;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            background-color: var(--danger-color);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            z-index: 10;
            transition: transform 0.1s;
        }

        #reset-btn:active {
            transform: scale(0.95);
        }

        .display {
            font-size: 5rem;
            font-variant-numeric: tabular-nums; /* Mantém os números alinhados */
            font-weight: bold;
            text-align: center;
        }

        .hint {
            margin-top: 20px;
            font-size: 0.9rem;
            opacity: 0.6;
            color: var(--accent-color);
        }
    </style>
</head>
<body id="body-click">

    <button id="reset-btn">ZERAR</button>

    <div class="display" id="display">00:00:00.00</div>
    
    <p class="hint">Toque em qualquer lugar para Iniciar/Pausar</p>

    <script>
        let startTime;
        let elapsedTime = 0;
        let timerInterval;
        let isRunning = false;

        const display = document.getElementById('display');
        const resetBtn = document.getElementById('reset-btn');
        const bodyClick = document.getElementById('body-click');

        function timeToString(time) {
            let diffInHrs = time / 3600000;
            let hh = Math.floor(diffInHrs);

            let diffInMin = (diffInHrs - hh) * 60;
            let mm = Math.floor(diffInMin);

            let diffInSec = (diffInMin - mm) * 60;
            let ss = Math.floor(diffInSec);

            let diffInMs = (diffInSec - ss) * 100;
            let ms = Math.floor(diffInMs);

            let formattedMM = mm.toString().padStart(2, "0");
            let formattedSS = ss.toString().padStart(2, "0");
            let formattedMS = ms.toString().padStart(2, "0");
            let formattedHH = hh.toString().padStart(2, "0");

            return `${formattedHH}:${formattedMM}:${formattedSS}.${formattedMS}`;
        }

        function print(txt) {
            display.innerHTML = txt;
        }

        function start() {
            startTime = Date.now() - elapsedTime;
            timerInterval = setInterval(function printTime() {
                elapsedTime = Date.now() - startTime;
                print(timeToString(elapsedTime));
            }, 10);
            isRunning = true;
        }

        function stop() {
            clearInterval(timerInterval);
            isRunning = false;
        }

        function reset() {
            stop();
            print("00:00:00.00");
            elapsedTime = 0;
        }

        // Evento de clique na tela (exceto no botão de reset)
        bodyClick.addEventListener('click', (e) => {
            if (e.target.id === 'reset-btn') return; // Se clicou no botão, não faz nada aqui
            
            if (!isRunning) {
                start();
            } else {
                stop();
            }
        });

        // Evento do botão reset
        resetBtn.addEventListener('click', () => {
            reset();
        });
    </script>
</body>
</html>
