<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            padding: 10px;
        }
        .container {
            max-width: 100%;
            padding: 0;
        }
        #btnRegistrar {
            padding: 1rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 50%;
            width: 120px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
        }
        @media (max-width: 768px) {
            body {
                padding: 8px;
            }
            .card {
                border-radius: 8px;
            }
            .card-body {
                padding: 1rem;
            }
            h1 {
                font-size: 1.5rem !important;
            }
            h5 {
                font-size: 1rem !important;
            }
            .btn {
                font-size: 0.9rem;
                padding: 0.5rem 0.75rem;
            }
            .table {
                font-size: 0.85rem;
            }
            .table td {
                padding: 0.4rem 0.3rem !important;
            }
            .table th {
                padding: 0.5rem 0.3rem !important;
            }
            .d-flex {
                flex-direction: column !important;
            }
            .mb-3 {
                margin-bottom: 1rem !important;
            }
            p.text-muted {
                font-size: 0.85rem;
            }
            .small {
                font-size: 0.75rem;
            }
        }
    </style>
</head>

<body class="bg-light">
    <div class="container py-3">
        <h1 class="mb-4 text-center">Agendamentos</h1>

        <div class="row gy-3 justify-content-center">
            <div class="col-12 col-md-8">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <div class="d-grid gap-2" style="gap: 0.5rem !important;">
                            <button id="btnRegistrar" type="button" class="btn btn-primary btn-lg">Registrar agora</button>
                        </div>
                        <div class="my-3">
                            <label for="dataHoraInput" class="form-label">Data e hora personalizada</label>
                            <input id="dataHoraInput" type="datetime-local" class="form-control" />
                        </div>
                        <div class="d-grid gap-2" style="gap: 0.5rem !important;">
                            <button id="btnResetDataHora" type="button" class="btn btn-outline-secondary">Registrar com data/hora personalizada</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-8">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">Calendário de marcações</h5>
                        <p class="text-muted mb-3">Clique no dia para ver as marcações feitas nessa data.</p>
                        <div class="mb-3">
                            <div class="d-flex gap-2 justify-content-center mb-3">
                                <button id="btnPrevMonth" type="button" class="btn btn-outline-secondary btn-sm">&lt; Anterior</button>
                                <div id="mesAtual" class="fw-semibold align-self-center" style="min-width: 180px; text-align: center;"></div>
                                <button id="btnNextMonth" type="button" class="btn btn-outline-secondary btn-sm">Próximo &gt;</button>
                            </div>
                            <div id="calendario" class="table-responsive"></div>
                        </div>
                        <div class="d-grid gap-2" style="gap: 0.5rem !important;">
                            <button id="btnLimpar" type="button" class="btn btn-outline-danger btn-sm">Limpar histórico</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const HISTORICO_KEY = 'marcacoesHistorico';

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleString('pt-BR', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function carregarHistorico() {
            const historicoJson = localStorage.getItem(HISTORICO_KEY);
            return historicoJson ? JSON.parse(historicoJson) : [];
        }

        function salvarHistorico(lista) {
            localStorage.setItem(HISTORICO_KEY, JSON.stringify(lista));
        }

        function getDailyCounts(historico) {
            return historico.reduce((acc, item) => {
                const date = new Date(item.data);
                const key = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
                acc[key] = (acc[key] || 0) + 1;
                return acc;
            }, {});
        }

        function getDailyDetails(historico) {
            return historico.reduce((acc, item) => {
                const date = new Date(item.data);
                const key = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
                acc[key] = acc[key] || [];
                acc[key].push(formatDate(item.data));
                return acc;
            }, {});
        }

        let calendarDate = new Date();

        function formatInputDateTime(date) {
            const local = new Date(date.getTime() - date.getTimezoneOffset() * 60000);
            return local.toISOString().slice(0, 16);
        }

        function atualizarMesAtual() {
            const label = document.getElementById('mesAtual');
            label.textContent = calendarDate.toLocaleString('pt-BR', { month: 'long', year: 'numeric' });
        }

        function renderizarCalendario() {
            const historico = carregarHistorico();
            const dailyCounts = getDailyCounts(historico);
            const dailyDetails = getDailyDetails(historico);
            const today = new Date();
            const year = calendarDate.getFullYear();
            const month = calendarDate.getMonth();
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const startWeekday = firstDay.getDay();
            const weeks = [];
            let day = 1 - startWeekday;

            while (day <= lastDay.getDate()) {
                const week = [];
                for (let i = 0; i < 7; i += 1) {
                    if (day < 1 || day > lastDay.getDate()) {
                        week.push(null);
                    } else {
                        const key = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                        const details = dailyDetails[key] || [];
                        const tooltip = details.length > 0 ? details.join('\n') : 'Nenhuma marcação';
                        const isToday = today.getFullYear() === year && today.getMonth() === month && today.getDate() === day;
                        week.push({ day, count: dailyCounts[key] || 0, isToday, tooltip });
                    }
                    day += 1;
                }
                weeks.push(week);
            }

            atualizarMesAtual();
            const calendarioDiv = document.getElementById('calendario');
            let html = '<table class="table table-bordered text-center mb-0">';
            html += '<thead><tr><th>Dom</th><th>Seg</th><th>Ter</th><th>Qua</th><th>Qui</th><th>Sex</th><th>Sáb</th></tr></thead>';
            html += '<tbody>';

            weeks.forEach((week) => {
                html += '<tr>';
                week.forEach((cell) => {
                    if (!cell) {
                        html += '<td class="bg-light"></td>';
                    } else {
                        const highlightClass = cell.isToday ? 'table-warning' : '';
                        const countLabel = cell.count > 0 ? `<div class="small text-success">${cell.count} marcações</div>` : '<div class="small text-muted">0</div>';
                        const tooltipData = encodeURIComponent(cell.tooltip);
                        html += `<td class="align-top ${highlightClass} calendar-day" style="cursor: pointer;" data-tooltip="${tooltipData}"><strong>${cell.day}</strong>${countLabel}</td>`;
                    }
                });
                html += '</tr>';
            });

            html += '</tbody></table>';
            calendarioDiv.innerHTML = html;

            // Adicionar event listener para clique nas células do calendário
            document.querySelectorAll('.calendar-day').forEach((cell) => {
                cell.addEventListener('click', (event) => {
                    const tooltip = decodeURIComponent(event.target.closest('.calendar-day').getAttribute('data-tooltip'));
                    alert(tooltip);
                });
            });
        }

        document.getElementById('btnRegistrar').addEventListener('click', () => {
            const novoItem = {
                data: new Date().toISOString()
            };

            const historico = carregarHistorico();
            historico.push(novoItem);
            salvarHistorico(historico);
            renderizarCalendario();
            alert('Marcação registrada com a data e hora atual!');
        });

        document.getElementById('btnResetDataHora').addEventListener('click', () => {
            const input = document.getElementById('dataHoraInput');
            const value = input.value;
            if (!value) {
                alert('Por favor, selecione uma data e hora!');
                return;
            }
            const novoItem = {
                data: new Date(value).toISOString()
            };
            
            const historico = carregarHistorico();
            historico.push(novoItem);
            salvarHistorico(historico);
            renderizarCalendario();
            alert('Marcação registrada com a data e hora personalizadas!');
        });

        document.getElementById('btnPrevMonth').addEventListener('click', () => {
            calendarDate.setMonth(calendarDate.getMonth() - 1);
            renderizarCalendario();
        });

        document.getElementById('btnNextMonth').addEventListener('click', () => {
            calendarDate.setMonth(calendarDate.getMonth() + 1);
            renderizarCalendario();
        });

        document.getElementById('btnLimpar').addEventListener('click', () => {
            if (confirm('Tem certeza que deseja limpar todo o histórico de marcações?')) {
                salvarHistorico([]);
                renderizarCalendario();
                alert('Histórico limpo com sucesso!');
            }
        });

        renderizarCalendario();
    </script>
</body>

</html>
